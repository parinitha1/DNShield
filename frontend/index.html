<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNS Shield — Tunnel Detection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c14;
      --surface:   #0d1220;
      --border:    #1a2540;
      --accent:    #3b82f6;
      --danger:    #ef4444;
      --success:   #22c55e;
      --warn:      #f59e0b;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .shell {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: var(--sans);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* ── Stats row ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: var(--sans);
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-value.danger  { color: var(--danger); }
    .stat-value.success { color: var(--success); }
    .stat-value.accent  { color: var(--accent); }

    /* ── Table panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
    }

    .filter-tabs {
      display: flex;
      gap: 4px;
    }

    .tab {
      padding: 5px 14px;
      font-size: 12px;
      font-family: var(--mono);
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all .15s;
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      background: var(--border);
      border-color: var(--border);
      color: var(--text);
    }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }

    thead tr { border-bottom: 1px solid var(--border); }

    th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      font-weight: 500;
      padding: 10px 20px;
      text-align: left;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(59,130,246,.04); }

    td {
      padding: 12px 20px;
      font-size: 13px;
      vertical-align: middle;
    }

    .domain-cell {
      font-family: var(--mono);
      color: var(--text);
      max-width: 380px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .03em;
    }

    .badge.malicious {
      background: rgba(239,68,68,.1);
      color: var(--danger);
      border: 1px solid rgba(239,68,68,.25);
    }

    .badge.normal {
      background: rgba(34,197,94,.1);
      color: var(--success);
      border: 1px solid rgba(34,197,94,.2);
    }

    .badge.blocked {
      background: rgba(245,158,11,.1);
      color: var(--warn);
      border: 1px solid rgba(245,158,11,.25);
    }

    .meta-cell { color: var(--muted); font-size: 12px; }

    .entropy-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bar-track {
      width: 60px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .4s ease;
    }

    .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Toast notifications ── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }

    .toast {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: #0d1220;
      border: 1px solid var(--danger);
      border-left: 3px solid var(--danger);
      border-radius: 10px;
      min-width: 320px;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      animation: slideIn .25s ease;
      font-size: 12px;
    }

    .toast-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .toast-title {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 13px;
      color: var(--danger);
      margin-bottom: 3px;
    }

    .toast-domain {
      color: var(--text);
      font-family: var(--mono);
      word-break: break-all;
      margin-bottom: 2px;
    }

    .toast-meta { color: var(--muted); }

    .toast-close {
      margin-left: auto;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      line-height: 1;
      padding: 0 2px;
    }

    .toast-close:hover { color: var(--text); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(20px); height: 0; padding: 0; margin: 0; border: none; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🛡</div>
      <div>
        <div class="logo-text">DNS Shield</div>
        <div class="logo-sub">Tunnel Detection System</div>
      </div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span>Monitoring active</span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Queries</div>
      <div class="stat-value accent" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Blocked</div>
      <div class="stat-value danger" id="stat-blocked">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Clean</div>
      <div class="stat-value success" id="stat-clean">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Block Rate</div>
      <div class="stat-value" id="stat-rate" style="color:var(--warn)">—</div>
    </div>
  </div>

  <!-- Table panel -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Query Log</div>
      <div class="filter-tabs">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="Malicious">Blocked</button>
        <button class="tab" data-filter="Normal">Clean</button>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Domain</th>
          <th>Status</th>
          <th>Entropy</th>
          <th>Length</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div id="empty" class="empty-state" style="display:none">
      No queries match the current filter.
    </div>
  </div>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
  // ── State ──────────────────────────────────────────────
  let allRows = [];
  let filter = 'all';
  let seenDomains = new Set();
  let blockedDomains = new Set();

  // ── Filter tabs ────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      renderTable();
    });
  });

  // ── Entropy helpers ────────────────────────────────────
  function entropy(domain) {
    const counts = {};
    for (const c of domain) counts[c] = (counts[c] || 0) + 1;
    const len = domain.length;
    return -Object.values(counts).reduce((s, n) => {
      const p = n / len;
      return s + p * Math.log2(p);
    }, 0);
  }

  function entropyColor(e) {
    if (e > 3.8) return 'var(--danger)';
    if (e > 3.0) return 'var(--warn)';
    return 'var(--success)';
  }

  // ── Toast ──────────────────────────────────────────────
  function showToast(domain, ent, len) {
    const container = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = `
      <div class="toast-icon">🚫</div>
      <div>
        <div class="toast-title">Query Blocked</div>
        <div class="toast-domain">${domain}</div>
        <div class="toast-meta">entropy ${ent.toFixed(2)} · length ${len}</div>
      </div>
      <div class="toast-close" onclick="dismissToast(this.closest('.toast'))">✕</div>
    `;
    container.appendChild(t);

    // auto-dismiss after 5 s
    setTimeout(() => dismissToast(t), 5000);
  }

  function dismissToast(el) {
    if (!el || !el.isConnected) return;
    el.style.animation = 'fadeOut .3s ease forwards';
    setTimeout(() => el.remove(), 300);
  }

  // ── Render ─────────────────────────────────────────────
  function renderTable() {
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty');

    const rows = filter === 'all' ? allRows : allRows.filter(r => r.result === filter);

    tbody.innerHTML = '';

    if (rows.length === 0) {
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';

    rows.slice().reverse().forEach(item => {
      const tr = document.createElement('tr');
      const ent = entropy(item.domain);
      const isBlocked = blockedDomains.has(item.domain);
      const statusLabel = isBlocked ? 'Blocked' : (item.result === 'Malicious' ? 'Malicious' : 'Clean');
      const badgeClass  = isBlocked ? 'blocked' : (item.result === 'Malicious' ? 'malicious' : 'normal');
      const statusIcon  = isBlocked ? '🚫' : (item.result === 'Malicious' ? '⚠' : '✓');
      const barPct      = Math.min((ent / 5) * 100, 100).toFixed(0);

      tr.innerHTML = `
        <td class="domain-cell">${item.domain}</td>
        <td><span class="badge ${badgeClass}">${statusIcon} ${statusLabel}</span></td>
        <td>
          <div class="entropy-bar">
            <div class="bar-track">
              <div class="bar-fill" style="width:${barPct}%;background:${entropyColor(ent)}"></div>
            </div>
            <span class="meta-cell">${ent.toFixed(2)}</span>
          </div>
        </td>
        <td class="meta-cell">${item.domain.length}</td>
        <td class="meta-cell">${item.time || '—'}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  // ── Stats ──────────────────────────────────────────────
  function updateStats() {
    const total   = allRows.length;
    const blocked = allRows.filter(r => r.result === 'Malicious').length;
    const clean   = total - blocked;
    const rate    = total ? ((blocked / total) * 100).toFixed(1) + '%' : '0%';

    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-blocked').textContent = blocked;
    document.getElementById('stat-clean').textContent   = clean;
    document.getElementById('stat-rate').textContent    = rate;
  }

  // ── Fetch ──────────────────────────────────────────────
  async function loadData() {
    try {
      const res  = await fetch('/logs');
      const data = await res.json();

      let hasNew = false;

      data.forEach(item => {
        const key = item.domain + '|' + item.result;
        if (!seenDomains.has(key)) {
          seenDomains.add(key);
          const now = new Date();
          item.time = now.toTimeString().slice(0, 8);
          allRows.push(item);
          hasNew = true;

          if (item.result === 'Malicious' && !blockedDomains.has(item.domain)) {
            blockedDomains.add(item.domain);
            showToast(item.domain, entropy(item.domain), item.domain.length);
          }
        }
      });

      if (hasNew) { updateStats(); renderTable(); }
    } catch (e) {
      // backend not running — demo mode
      if (allRows.length === 0) seedDemo();
    }
  }

  // ── Demo mode (no backend) ─────────────────────────────
  function seedDemo() {
    const samples = [
      { domain: 'xkf72hqpwz9amvjt.evil-c2.net',  result: 'Malicious' },
      { domain: 'google.com',                       result: 'Normal'    },
      { domain: 'n4mz8rk1lqvbc3xw.tunnel.io',      result: 'Malicious' },
      { domain: 'github.com',                       result: 'Normal'    },
      { domain: 'api.stripe.com',                   result: 'Normal'    },
      { domain: 'p9kvzxqm17wbjntf.data-exfil.cc',  result: 'Malicious' },
      { domain: 'cloudflare.com',                   result: 'Normal'    },
      { domain: 'r3xbf8mhzjqwvtsd.covert.pw',      result: 'Malicious' },
      { domain: 'cdn.jsdelivr.net',                 result: 'Normal'    },
      { domain: 'fonts.googleapis.com',             result: 'Normal'    },
    ];

    let i = 0;
    const tick = () => {
      if (i >= samples.length) return;
      const item = { ...samples[i], time: new Date().toTimeString().slice(0, 8) };
      allRows.push(item);
      if (item.result === 'Malicious' && !blockedDomains.has(item.domain)) {
        blockedDomains.add(item.domain);
        showToast(item.domain, entropy(item.domain), item.domain.length);
      }
      updateStats(); renderTable();
      i++;
      setTimeout(tick, 900);
    };
    tick();
  }

  setInterval(loadData, 3000);
  loadData();
</script>
</body>
</html>
